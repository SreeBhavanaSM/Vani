/* ---------------- audio (tiny synth, no files needed) ---------------- */
let _ctx = null;
function getCtx() {
  if (!_ctx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    _ctx = new AC();
  }
  if (_ctx.state === "suspended") _ctx.resume();
  return _ctx;
}
function chime(freq = 880) {
  try {
    const ctx = getCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = "sine";
    o.frequency.value = freq;
    o.connect(g);
    g.connect(ctx.destination);
    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime + 0.03);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1.1);
    o.start();
    o.stop(ctx.currentTime + 1.1);
  } catch (e) {}
}
function shutterClick() {
  try {
    const ctx = getCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = "square";
    o.frequency.setValueAtTime(1200, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.06);
    o.connect(g);
    g.connect(ctx.destination);
    g.gain.setValueAtTime(0.12, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.08);
    o.start();
    o.stop(ctx.currentTime + 0.09);
  } catch (e) {}
}
function whoosh() {
  try {
    const ctx = getCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = "sawtooth";
    o.frequency.setValueAtTime(600, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.9);
    o.connect(g);
    g.connect(ctx.destination);
    g.gain.setValueAtTime(0.1, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.9);
    o.start();
    o.stop(ctx.currentTime + 0.9);
  } catch (e) {}
}

/* ---------------- gentle background melody (procedural, no audio file needed) ---------------- */
let _melodyOn = false;
let _melodyTimer = null;
// A soft, slow music-box style phrase — plays low in the background on loop.
const MELODY_PHRASE = [
  { f: 523.25, d: 0.9 }, { f: 659.25, d: 0.9 }, { f: 783.99, d: 0.9 }, { f: 659.25, d: 0.9 },
  { f: 587.33, d: 0.9 }, { f: 783.99, d: 0.9 }, { f: 987.77, d: 1.6 }, { f: 0, d: 0.9 },
  { f: 493.88, d: 0.9 }, { f: 587.33, d: 0.9 }, { f: 659.25, d: 0.9 }, { f: 587.33, d: 1.6 }, { f: 0, d: 1.0 },
];
function playMelodyNote(freq, dur, delay) {
  if (!freq) return;
  try {
    const ctx = getCtx();
    const t0 = ctx.currentTime + delay;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = "triangle";
    o.frequency.value = freq;
    o.connect(g);
    g.connect(ctx.destination);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(0.045, t0 + 0.15);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.start(t0);
    o.stop(t0 + dur + 0.05);
  } catch (e) {}
}
function scheduleMelodyLoop() {
  if (!_melodyOn) return;
  let t = 0;
  MELODY_PHRASE.forEach((n) => {
    playMelodyNote(n.f, n.d * 0.95, t);
    t += n.d;
  });
  _melodyTimer = setTimeout(scheduleMelodyLoop, t * 1000 + 600);
}
function startMelody() {
  if (_melodyOn) return;
  _melodyOn = true;
  scheduleMelodyLoop();
}
function stopMelody() {
  _melodyOn = false;
  if (_melodyTimer) clearTimeout(_melodyTimer);
}

let _starUid = 0;
function makeStar(x, y, size) {
  _starUid += 1;
  return { id: _starUid, x, y, size: size ?? Math.random() * 2 + 1.4 };
}

// A starfield you can tap. Every tap splits that star into two, drifting apart —
// the "magical entry" touch effect.
function InteractiveStars({ count = 26 }) {
  const [stars, setStars] = useState(() =>
    Array.from({ length: count }, () => makeStar(Math.random() * 100, Math.random() * 100))
  );

  const splitStar = useCallback((star) => {
    chime(1100 + Math.random() * 400);
    setStars((prev) => {
      const rest = prev.filter((s) => s.id !== star.id);
      const spread = 6 + Math.random() * 6;
      const a = makeStar(
        Math.min(97, Math.max(3, star.x - spread)),
        Math.min(97, Math.max(3, star.y - spread * 0.6)),
        Math.min(star.size + 0.8, 4)
      );
      const b = makeStar(
        Math.min(97, Math.max(3, star.x + spread)),
        Math.min(97, Math.max(3, star.y + spread * 0.6)),
        Math.min(star.size + 0.8, 4)
      );
      return prev.length > 160 ? [...rest, a, b].slice(-160) : [...rest, a, b];
    });
  }, []);

  return (
    <div className="absolute inset-0 overflow-hidden" style={{ zIndex: 5 }}>
      {stars.map((s) => (
        <button
          key={s.id}
          onClick={() => splitStar(s)}
          aria-label="A star — tap it"
          style={{
            position: "absolute",
            top: `${s.y}%`,
            left: `${s.x}%`,
            width: Math.max(22, s.size * 8),
            height: Math.max(22, s.size * 8),
            transform: "translate(-50%,-50%)",
            background: "transparent",
            border: "none",
            cursor: "pointer",
            padding: 0,
          }}
        >
          <span
            style={{
              display: "block",
              width: s.size * 3,
              height: s.size * 3,
              margin: "0 auto",
              borderRadius: "50%",
              background: "radial-gradient(circle, #FFFDF2 0%, #FFE9C2 55%, transparent 75%)",
              boxShadow: `0 0 ${s.size * 4}px ${s.size}px rgba(255,233,194,0.7)`,
              animation: "starPop 0.5s ease",
            }}
          />
        </button>
      ))}
    </div>
  );
}

function Confetti({ show }) {
  const pieces = useRef(
    Array.from({ length: 70 }, () => ({
      left: Math.random() * 100,
      color: ["#F5C56B", "#F4A6A0", "#81C784", "#4FC3F7", "#BA68C8", "#FFF176"][Math.floor(Math.random() * 6)],
      delay: Math.random() * 0.8,
      dur: 2.6 + Math.random() * 1.6,
      size: 6 + Math.random() * 6,
      rot: Math.random() * 360,
    }))
  ).current;
  if (!show) return null;
  return (
    <div className="fixed inset-0 pointer-events-none z-40 overflow-hidden">
      {pieces.map((p, i) => (
        <div
          key={i}
          style={{
            position: "absolute",
            top: "-5%",
            left: `${p.left}%`,
            width: p.size,
            height: p.size * 0.5,
            background: p.color,
            transform: `rotate(${p.rot}deg)`,
            animation: `confettiFall ${p.dur}s linear ${p.delay}s forwards`,
            borderRadius: 2,
          }}
        />
      ))}
    </div>
  );
}

function Fireworks({ show }) {
  const bursts = useRef(

      top: 15 + Math.random() * 40,
      left: 10 + Math.random() * 80,
      delay: Math.random() * 1.4,

    }))
  ).current;
  if (!show) return null;
  return (
    <div className="fixed inset-0 pointer-events-none z-30 overflow-hidden">
      {bursts.map((b, i) => (
        <div
          key={i}
          style={{
            position: "absolute",
            top: `${b.top}%`,
            left: `${b.left}%`,
            width: 6,
            height: 6,
            borderRadius: "50%",
            boxShadow: `0 0 0 0 ${b.color}`,

            animation: `fireworkBurst 1.6s ease-out ${b.delay}s forwards`,

}

function Balloons({ show }) {

    Array.from({ length: 10 }, () => ({
      left: Math.random() * 90,
      color: ["#F4A6A0", "#F5C56B", "#4FC3F7", "#BA68C8", "#81C784"][Math.floor(Math.random() * 5)],

      dur: 6 + Math.random() * 3,

  if (!show) return null;
  return (

          style={{

/* ================= LAUNCH DATE PUZZLE SCENE ================= */
function DialColumn({ label, value, min, max, onChange, pad = 2 }) {
  return (
    <div className="flex flex-col items-center" style={{ gap: 6 }}>
      <button
        onClick={() => onChange(value >= max ? min : value + 1)}
        aria-label={`Increase ${label}`}
        style={{ background: "none", border: "none", color: "#F5C56B", fontSize: 20, cursor: "pointer", padding: 4 }}
      >
        ▲
      </button>
      <div
        style={{
          width: 74,
          height: 64,
          borderRadius: 10,
          background: "linear-gradient(180deg,#151d3f,#0b1230)",
          border: "1px solid rgba(245,197,107,0.35)",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          fontFamily: "'Playfair Display', serif",
          fontSize: "1.7rem",
          color: "#FFE9C2",
          boxShadow: "inset 0 0 14px rgba(0,0,0,0.5)",
        }}
      >
        {String(value).padStart(pad, "0")}
      </div>
      <button
        onClick={() => onChange(value <= min ? max : value - 1)}
        aria-label={`Decrease ${label}`}
        style={{ background: "none", border: "none", color: "#F5C56B", fontSize: 20, cursor: "pointer", padding: 4 }}
      >
        ▼
      </button>
      <span style={{ fontFamily: "'Quicksand', sans-serif", fontSize: "0.65rem", color: "#9BA6D4", letterSpacing: 1 }}>{label}</span>
    </div>
  );
}

function LaunchPuzzleScene({ onContinue }) {
  const [month, setMonth] = useState(1);
  const [day, setDay] = useState(1);
  const [tries, setTries] = useState(0);
  const [nudge, setNudge] = useState(false);
  const [locked, setLocked] = useState(false);

  const tryLaunch = () => {
    if (month === LAUNCH_MONTH && day === LAUNCH_DAY) {
      whoosh();
      setLocked(true);
    } else {
      setTries((t) => t + 1);
      setNudge(true);
      setTimeout(() => setNudge(false), 500);
    }
  };

  const hint =
    tries === 0
      ? "Every great pilot flies by her own flight log. Set the dials to her launch date."
      : tries < 3
      ? "Not quite, Captain. Hint: it's the day the sky got a little more brilliant. 🌤️"
      : "Okay okay — it's July. Just find the day now. 😉";

  return (
    <div className="relative w-full h-full flex flex-col items-center justify-center overflow-hidden px-6" style={{ background: "radial-gradient(ellipse at 50% 15%, #1a2550 0%, #070a1f 70%)" }}>
      <Stars count={45} />
      <Confetti show={locked} />

      {!locked ? (
        <div className="relative z-10 text-center" style={{ maxWidth: 420 }}>
          <div style={{ fontSize: 34, marginBottom: 6 }}>🛰️</div>
          <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: "1.4rem", color: "#FFE9C2", marginBottom: 8 }}>
            Mission Control: Decode The Launch Date
          </h2>
          <p style={{ fontFamily: "'Quicksand', sans-serif", fontSize: "0.85rem", color: "#C9D3EE", marginBottom: 22, minHeight: 40 }}>
            {hint}
          </p>

          <div
            className="flex items-center justify-center gap-6"
            style={{ animation: nudge ? "shakeNo 0.5s ease" : "none" }}
          >
            <DialColumn label="MONTH" value={month} min={1} max={12} onChange={setMonth} />
            <div style={{ fontFamily: "'Playfair Display', serif", fontSize: "1.6rem", color: "#F5C56B" }}>/</div>
            <DialColumn label="DAY" value={day} min={1} max={31} onChange={setDay} />
          </div>

          <button
            onClick={tryLaunch}
            className="mt-8 px-7 py-3 rounded-full text-sm"
            style={{ background: "linear-gradient(135deg,#F5C56B,#E0A94C)", color: "#2a1c05", fontFamily: "'Quicksand', sans-serif", fontWeight: 700 }}
          >
            Confirm Launch Date 🚀
          </button>
        </div>
      ) : (
        <div className="relative z-10 text-center px-6" style={{ maxWidth: 420 }}>
          <div style={{ fontSize: 46, animation: "popIn 1s ease" }}>🚀</div>
          <h2
            style={{
              fontFamily: "'Playfair Display', serif",
              fontSize: "2rem",
              color: "#FFE1A8",
              textShadow: "0 0 26px rgba(255,225,168,0.6)",
              animation: "popIn 1.2s ease",
              marginTop: 6,
            }}
          >
            Launch Confirmed: 07 / 09
          </h2>
          <p style={{ fontFamily: "'Quicksand', sans-serif", fontSize: "0.9rem", color: "#C9D3EE", marginTop: 8, animation: "fadeInSoft 1.6s ease" }}>
            Every year on this day, the sky got a little luckier. Mission Vani, cleared for liftoff. 🎉
          </p>
          <button
            onClick={onContinue}
            className="mt-9 px-7 py-3 rounded-full text-sm"
            style={{ background: "linear-gradient(135deg,#F5C56B,#E0A94C)", color: "#2a1c05", fontFamily: "'Quicksand', sans-serif", fontWeight: 700, animation: "fadeInSoft 2s ease" }}
          >
            Continue The Mission →
          </button>
        </div>
      )}
    </div>
  );
}

/* ================= CAKE / CANDLES SCENE ================= */
function CakeScene({ onDone }) {
  const [lit, setLit] = useState(Array(11).fill(false));
  const [activeBlessing, setActiveBlessing] = useState(null); // {idx,title,text,color}
  const [phase, setPhase] = useState("lighting"); // lighting -> aura -> message -> teddyline -> countdown -> blown -> celebrate
  const [countdownVal, setCountdownVal] = useState(9);
  const nextToLight = lit.findIndex((v) => !v);

  const lightCandle = (idx) => {
    if (idx !== nextToLight || phase !== "lighting") return;
    chime(520 + idx * 28);
    const next = [...lit];
    next[idx] = true;
    setLit(next);

    if (idx < 10) {
      const b = BLESSINGS[idx];
      setActiveBlessing({ idx, ...b });
    } else {
      // 11th candle — make a wish
      setActiveBlessing(null);
      setPhase("aura");
      setTimeout(() => setPhase("message"), 1400);
      setTimeout(() => setPhase("teddyline"), 4600);
      setTimeout(() => setPhase("countdown"), 8600);
    }
  };

  useEffect(() => {
    if (phase !== "countdown") return;
    if (countdownVal === 0) {
      whoosh();
      setPhase("blown");
      setTimeout(() => setPhase("celebrate"), 300);
      return;
    }
    const t = setTimeout(() => setCountdownVal((v) => v - 1), 1000);
    return () => clearTimeout(t);
  }, [phase, countdownVal]);

  const allLit = lit.every(Boolean);
  const blownOut = phase === "blown" || phase === "celebrate";

  return (
    <div
      className="relative w-full h-full flex flex-col items-center justify-center overflow-hidden"
      style={{ background: "radial-gradient(ellipse at 50% 25%, #1a2550 0%, #10173c 45%, #070a1f 100%)" }}
    >
      <Stars count={50} />
      <Confetti show={phase === "celebrate"} />
      <Fireworks show={phase === "celebrate"} />
      <Balloons show={phase === "celebrate"} />

      <div className="relative z-10 text-center px-6" style={{ maxWidth: 480 }}>
        {phase === "celebrate" ? (
          <h2
            style={{
              fontFamily: "'Playfair Display', serif",
              fontSize: "2.4rem",
              color: "#FFE1A8",
              textShadow: "0 0 30px rgba(255,225,168,0.6)",
              animation: "popIn 1s ease",
            }}
          >
            Happy Birthday, {HER_NAME}! 🎉
          </h2>
        ) : (
          <>
            <h2
              style={{
                fontFamily: "'Playfair Display', serif",
                fontSize: "1.5rem",
                color: "#FFE9C2",
                marginBottom: 6,
              }}
            >
            {nextToLight === -1 ? "" : nextToLight === 10 ? "" : ""}
            </h2>
            <p style={{ fontFamily: "'Quicksand', sans-serif", color: "#C9D3EE", fontSize: "0.85rem" }}>
              {nextToLight === 10 ? "This one is just for you." : ""}
            </p>
          </>
        )}
      </div>

      {/* the cake */}
      <div className="relative mt-2" style={{ width: 300, height: 170 }}>
        {/* blessing float text */}
        {activeBlessing && (
          <div
            key={activeBlessing.idx}
            className="absolute left-1/2 text-center"
            style={{
              bottom: 195,
              top: "auto",
              zIndex: 20,
              transform: "translateX(-50%)",
              width: 270,
              animation: "blessingIn 0.9s cubic-bezier(.2,.8,.3,1)",
            }}
          >
            <div
              style={{
                padding: "14px 16px",
                borderRadius: 14,
                background: "rgba(10,14,40,0.55)",
                border: `1px solid ${activeBlessing.color}55`,
                boxShadow: `0 0 26px 4px ${activeBlessing.color}33`,
                backdropFilter: "blur(2px)",
              }}
            >
              <div style={{ fontSize: "0.85rem", marginBottom: 2 }}>✨</div>
              <div
                style={{
                  fontFamily: "'Caveat', cursive",
                  fontSize: "1.05rem",
                  fontWeight: 700,
                  color: activeBlessing.color,
                  textShadow: `0 0 14px ${activeBlessing.color}88`,
                }}
              >
                {activeBlessing.title}
              </div>
              <div
                style={{
                  fontFamily: "'Caveat', cursive",
                  fontSize: "1.15rem",
                  color: "#FFF6E4",
                  marginTop: 2,
                  textShadow: "0 0 10px rgba(255,255,255,0.35)",
                }}
              >
                &ldquo;{activeBlessing.text}&rdquo;
              </div>
            </div>
          </div>
        )}

        {phase === "message" && (
          <div
            className="absolute left-1/2 text-center"
            style={{
              top: -100,
              transform: "translateX(-50%)",
              width: 300,
              fontFamily: "'Caveat', cursive",
              fontSize: "1.3rem",
              color: "#FFE1A8",
              animation: "fadeInSoft 1.2s ease",
            }}
          >
            Every light carries a wish.<br />Every wish carries love.
          </div>
        )}
        {phase === "teddyline" && (
          <div className="absolute left-1/2 text-center" style={{ top: -150, transform: "translateX(-50%)", width: 280 }}>
            <Teddy size={40} style={{ margin: "0 auto" }} />
            <div style={{ fontFamily: "'Caveat', cursive", fontSize: "1.2rem", color: "#FFE9C2", marginTop: 4, animation: "fadeInSoft 1s ease" }}>
              &ldquo;Now it&rsquo;s your turn... close your eyes, make a wish, and let the stars keep your secret.&rdquo;
            </div>
          </div>
        )}
        {phase === "countdown" && (
          <div
            className="absolute left-1/2"
            style={{
              top: -110,
              transform: "translateX(-50%)",
              fontFamily: "'Playfair Display', serif",
              fontSize: "3rem",
              color: "#FFE1A8",
              textShadow: "0 0 24px rgba(255,225,168,0.7)",
            }}
            key={countdownVal}
          >
            {countdownVal > 0 ? countdownVal : "🌬️"}

        )}

        {/* golden aura */}
        {(phase === "aura" || phase === "message" || phase === "teddyline" || phase === "countdown") && (
          <div
            className="absolute inset-0"
            style={{
              borderRadius: "50%",
              boxShadow: "0 0 55px 18px rgba(245,197,107,0.25)",
              animation: "pulseGlow 2s ease-in-out infinite",
              pointerEvents: "none",
            }}
          />
        )}

        {/* cake layers */}
        <div className="absolute bottom-0 left-1/2" style={{ transform: "translateX(-50%)", width: 260, height: 60, background: "linear-gradient(180deg,#F8D9A0,#E7B979)", borderRadius: "10px 10px 4px 4px" }} />
        <div className="absolute" style={{ bottom: 55, left: "50%", transform: "translateX(-50%)", width: 210, height: 55, background: "linear-gradient(180deg,#F3B7C4,#E092A4)", borderRadius: "10px 10px 4px 4px" }} />
        <div className="absolute" style={{ bottom: 104, left: "50%", transform: "translateX(-50%)", width: 160, height: 45, background: "linear-gradient(180deg,#F5C56B,#E0A94C)", borderRadius: "10px 10px 4px 4px" }} />

        {/* candles */}
        {Array.from({ length: 11 }).map((_, i) => {
          const leftPct = 12 + i * 7.2;
          const isLit = lit[i];
          const isNext = i === nextToLight;
          return (
            <button
              key={i}
              onClick={() => lightCandle(i)}
              aria-label={`Candle ${i + 1}`}
              className="absolute"
              style={{
                left: `${leftPct}%`,
                bottom: 148,
                width: 5,
                height: 22,
                background: "linear-gradient(180deg,#fff,#ffe9c2)",
                border: "none",
                borderRadius: 2,
                cursor: isNext && phase === "lighting" ? "pointer" : "default",
                boxShadow: isNext && phase === "lighting" ? "0 0 10px 2px rgba(245,197,107,0.6)" : "none",
              }}
            >
              {isLit && !blownOut && (
                <div
                  style={{
                    position: "absolute",
                    top: -12,
                    left: "50%",
                    transform: "translateX(-50%)",
                    width: 7,
                    height: 11,
                    borderRadius: "50% 50% 50% 50%/60% 60% 40% 40%",
                    background: `radial-gradient(circle,#fff8e1 0%, ${BLESSINGS[i]?.color || WISH_COLOR} 70%)`,
                    animation: "flicker 0.6s ease-in-out infinite alternate",
                    boxShadow: `0 0 8px 2px ${BLESSINGS[i]?.color || WISH_COLOR}`,
                  }}
                />
              )}
            </button>
          );
        })}
      </div>

      {phase === "celebrate" && (
        <button
          onClick={onDone}
          className="relative z-10 mt-10 px-7 py-3 rounded-full text-sm"
          style={{
            background: "linear-gradient(135deg,#F5C56B,#E0A94C)",
            color: "#2a1c05",
            fontFamily: "'Quicksand', sans-serif",
            fontWeight: 700,
            animation: "fadeInSoft 2s ease",
          }}
        >
          Continue →
        </button>
      )}
    </div>
  );
}

        {lines[idx]}

      {idx === lines.length - 1 && (

}

/* ================= GIFT SCENE ================= */
function GiftScene({ onOpened }) {
  const [lineIdx, setLineIdx] = useState(0);
  const [showBox, setShowBox] = useState(false);
  const [ready, setReady] = useState(false);
  const isLastLine = lineIdx === GIFT_LINES.length - 1;

  useEffect(() => {
    if (isLastLine) {
      const t = setTimeout(() => setShowBox(true), 1800);
      return () => clearTimeout(t);
    }
    const t = setTimeout(() => setLineIdx((i) => i + 1), 2000);
    return () => clearTimeout(t);
  }, [lineIdx, isLastLine]);

  useEffect(() => {
    if (!showBox) return;
    const t = setTimeout(() => setReady(true), 2600);
    return () => clearTimeout(t);
  }, [showBox]);

  return (
    <div className="relative w-full h-full flex flex-col items-center justify-center overflow-hidden" style={{ background: "radial-gradient(ellipse at 50% 20%, #1a2550 0%, #070a1f 70%)" }}>
      <Stars count={40} />

      {!showBox && (
        <div className="relative z-10 text-center px-6" style={{ maxWidth: 380 }}>
          <Teddy size={70} style={{ margin: "0 auto 14px" }} />
          <p key={lineIdx} style={{ fontFamily: "'Caveat', cursive", fontSize: "1.6rem", color: "#FFE9C2", animation: "fadeInSoft 1s ease" }}>
            &ldquo;{GIFT_LINES[lineIdx]}&rdquo;
          </p>
        </div>
      )}

      {showBox && (

function FlipbookScene({ onContinue }) {
  const [index, setIndex] = useState(0);
  const [anim, setAnim] = useState(null); // { fromPage, direction }
  const audioRef = useRef(null);

  useEffect(() => {
    stopMelody(); // pause the ambient music-box tune so it doesn't clash with the song
    const audio = audioRef.current;
    if (audio) {
      audio.volume = 0.55;
      audio.play().catch(() => {}); // ignored if the browser blocks it or the file isn't there yet
    }
    return () => {
      if (audio) {
        audio.pause();
        audio.currentTime = 0;
      }
      startMelody(); // resume the ambient tune once you leave the flipbook
    };
  }, []);

  const go = (dir) => {
    if (anim) return;
    const from = MEMORY_PAGES[index];
    setAnim({ fromPage: from, direction: dir });
    setTimeout(() => {
      setIndex((i) => (dir === "next" ? (i + 1) % MEMORY_PAGES.length : (i - 1 + MEMORY_PAGES.length) % MEMORY_PAGES.length));
      setAnim(null);
    }, 700);
  };

  const current = MEMORY_PAGES[index];

  return (
    <div className="relative w-full h-full overflow-hidden" style={{ background: "#000", perspective: 1800 }}>
      <audio ref={audioRef} src={FLIPBOOK_SONG} loop />
      {/* base layer: the page being revealed */}
      <FlipbookPage page={current} />

      {/* static center spine shadow, like a real bound book */}
      <div
        className="absolute inset-y-0 pointer-events-none"
        style={{ left: "50%", width: 46, transform: "translateX(-50%)", background: "linear-gradient(90deg, transparent, rgba(0,0,0,0.25), transparent)", zIndex: 5 }}
      />

      {/* flipping top layer: the page being left, curling away like real paper */}
      {anim && (
        <div
          className="absolute inset-0"
          style={{
            transformOrigin: anim.direction === "next" ? "left center" : "right center",
            animation: `${anim.direction === "next" ? "pageFlipNext" : "pageFlipPrev"} 0.7s cubic-bezier(.37,0,.24,1) forwards`,
            boxShadow: "0 0 50px rgba(0,0,0,0.65)",
            backfaceVisibility: "hidden",
            WebkitBackfaceVisibility: "hidden",
            willChange: "transform",
            zIndex: 6,
          }}
        >
          <FlipbookPage page={anim.fromPage} />
          {/* curl shadow — darkens near the turning edge and sweeps across as it rotates */}
          <div
            className="absolute inset-0 pointer-events-none"
            style={{
              background:
                anim.direction === "next"
                  ? "linear-gradient(90deg, rgba(0,0,0,0.45), rgba(0,0,0,0.05) 40%, transparent 70%)"
                  : "linear-gradient(270deg, rgba(0,0,0,0.45), rgba(0,0,0,0.05) 40%, transparent 70%)",
              animation: `${anim.direction === "next" ? "curlShadowNext" : "curlShadowPrev"} 0.7s cubic-bezier(.37,0,.24,1) forwards`,
            }}
          />
        </div>
      )}

      <div className="absolute top-5 left-0 right-0 flex items-center justify-center z-10 pointer-events-none">
        <span
          style={{
            fontFamily: "'Quicksand', sans-serif",
            fontSize: "0.7rem",
            color: "#FFE9C2",
            background: "rgba(0,0,0,0.35)",
            padding: "5px 14px",
            borderRadius: 999,
            letterSpacing: 1,
          }}
        >
          {index + 1} / {MEMORY_PAGES.length}
        </span>
      </div>

      <button
        onClick={() => go("prev")}
        aria-label="Previous page"
        className="absolute z-10"
        style={{
          left: 14,
          top: "50%",
          transform: "translateY(-50%)",
          width: 42,
          height: 42,
          borderRadius: "50%",
          background: "rgba(0,0,0,0.4)",
          border: "1px solid rgba(245,197,107,0.5)",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          cursor: "pointer",
        }}
      >
        <ChevronLeft size={22} color="#F5C56B" />
      </button>
      <button
        onClick={() => go("next")}
        aria-label="Next page"
        className="absolute z-10"
        style={{
          right: 14,
          top: "50%",
          transform: "translateY(-50%)",
          width: 42,
          height: 42,
          borderRadius: "50%",
          background: "rgba(0,0,0,0.4)",
          border: "1px solid rgba(245,197,107,0.5)",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          cursor: "pointer",
        }}
      >
        <ChevronRight size={22} color="#F5C56B" />
      </button>

      {index === MEMORY_PAGES.length - 1 && (
        <button
          onClick={onContinue}
          className="absolute z-10 bottom-7 left-1/2 px-6 py-2.5 rounded-full text-sm"
          style={{
            transform: "translateX(-50%)",
            background: "linear-gradient(135deg,#F5C56B,#E0A94C)",
            color: "#2a1c05",
            fontFamily: "'Quicksand', sans-serif",
            fontWeight: 700,
            boxShadow: "0 4px 16px rgba(0,0,0,0.4)",
            animation: "fadeInSoft 1s ease",
          }}
        >
          Continue →
        </button>
      )}
    </div>
  );
}

  { q: "ತಿನ್ನುತ್ತಾ ಕುಡಿಯುತ್ತದೆ, ಕುಡಿಯುತ್ತಾ ತಿನ್ನುತ್ತದೆ.", a: "ಬೆಂಕಿ" },
  { q: "ಒಡೆದರೆ ಮಾತ್ರ ಕೆಲಸಕ್ಕೆ ಬರುತ್ತೇನೆ.", a: "ಮೊಟ್ಟೆ" },
  { q: "ಕೈಯಿಲ್ಲ, ಕಾಲಿಲ್ಲ, ಮನೆ ಮನೆಗೆ ಹೋಗುತ್ತೇನೆ.", a: "ಪತ್ರ" },
  { q: "ಬಾಯಿಲ್ಲ, ಹಲ್ಲಿಲ್ಲ, ಆದರೆ ಕಚ್ಚುತ್ತೇನೆ.", a: "ಚಳಿ" },
  { q: "ನಿಂತರೆ ಉದ್ದ, ಮಲಗಿದರೆ ಚಿಕ್ಕದು.", a: "ನೆರಳು" },
  { q: "ಕಪ್ಪು ಹೊಲದಲ್ಲಿ ಬಿಳಿ ಬೀಜ.", a: "ಚಾಕ್‌ನಿಂದ ಬರೆದ ಫಲಕ" },
  { q: "ಮನೆ ತುಂಬ ಮಕ್ಕಳು, ಬಾಗಿಲೇ ಇಲ್ಲ.", a: "ದಾಳಿಂಬೆ" },
  { q: "ತಾಯಿ ಹಸಿರು, ಮಕ್ಕಳು ಮುತ್ತಿನಂತೆ.", a: "ಬಟಾಣಿ" },
  { q: "ಮರದ ಮೇಲೆ ಮನೆ, ಮನೆಯೊಳಗೆ ನೀರು.", a: "ತೆಂಗಿನಕಾಯಿ" },
  { q: "ಅಮ್ಮ ಸೀರೆ ಬಿಚ್ಚಿದಳು, ಊರೆಲ್ಲ ಮಲಗಿತು.", a: "ರಾತ್ರಿ" },
  { q: "ಅಮ್ಮ ಹಸಿರು, ಮಕ್ಕಳು ಕೆಂಪು, ಮೊಮ್ಮಕ್ಕಳು ಕಪ್ಪು.", a: "ಕಲ್ಲಂಗಡಿ" },
  { q: "ಅಪ್ಪ ಕಪ್ಪು, ಅಮ್ಮ ಬಿಳಿ, ಮಕ್ಕಳು ಹಸಿರು.", a: "ಏಲಕ್ಕಿ" },
  { q: "ತಿಂದರೆ ಅಳು, ತಿನ್ನದಿದ್ದರೆ ಬೇಸರ.", a: "ಈರುಳ್ಳಿ" },
  { q: "ನನ್ನನ್ನು ನೋಡಿ ಎಲ್ಲರೂ ನಗುತ್ತಾರೆ, ನನ್ನನ್ನು ತಿಂದರೆ ಎಲ್ಲರೂ ಅಳುತ್ತಾರೆ.", a: "ಮೆಣಸಿನಕಾಯಿ" },
  { q: "ಒಂದು ಮನೆಯಲ್ಲಿಬ್ಬರು ಅಣ್ಣತಮ್ಮಂದಿರು, ಯಾವತ್ತೂ ಭೇಟಿಯಾಗುವುದಿಲ್ಲ.", a: "ಕಣ್ಣುಗಳು" },
  { q: "ಕೈ ಇದೆ, ಬೆರಳು ಇಲ್ಲ.", a: "ಬಾಳೆ ಎಲೆ" },
  { q: "ತಲೆ ಇದೆ, ಕೂದಲು ಇಲ್ಲ; ಕಾಲು ಇದೆ, ನಡೆಯುವುದಿಲ್ಲ.", a: "ಅಣಬೆ" },
  { q: "ಮನೆಯ ಮೇಲೊಬ್ಬ ರಾಜ, ಯಾರೂ ಕೆಳಗಿಳಿಸಲಾರರು.", a: "ಹೆಂಚಿನ ಮೇಲಿನ ಕುಂಬಳಕಾಯಿ" },
  { q: "ನನ್ನ ಹೊಟ್ಟೆ ಕತ್ತರಿಸಿದರೆ ನಿಮ್ಮ ಹೊಟ್ಟೆ ತುಂಬುತ್ತದೆ.", a: "ತೆಂಗಿನಕಾಯಿ" },
  { q: "ಹುಟ್ಟಿದ್ದು ಕಾಡಿನಲ್ಲಿ, ಸಾಯುವುದು ಅಡುಗೆಮನೆಯಲ್ಲಿ.", a: "ಕಟ್ಟಿಗೆ" },
  { q: "ಅಣ್ಣ ಹೊರಗೆ ನಿಂತಿದ್ದಾನೆ, ತಮ್ಮ ಒಳಗೆ ಮಲಗಿದ್ದಾನೆ.", a: "ಬಾಳೆಹಣ್ಣು" },
  { q: "ಬಟ್ಟೆ ತೆಗೆದರೆ ಮಾತ್ರ ನನ್ನ ಬೆಲೆ.", a: "ಬಾಳೆಹಣ್ಣು" },
  { q: "ಮನೆ ಇದೆ, ಬಾಗಿಲಿಲ್ಲ; ಒಳಗೆ ನೀರು.", a: "ತೆಂಗಿನಕಾಯಿ" },
  { q: "ತಲೆ ಒಡೆದರೆ ಮಾತ್ರ ನನ್ನ ಮಾತು ಕೇಳುತ್ತೀರಿ.", a: "ತೆಂಗಿನಕಾಯಿ" },
  { q: "ಬೆಂಕಿಗೆ ಹಾಕಿದಷ್ಟು ನಾನು ಚೆನ್ನಾಗುತ್ತೇನೆ.", a: "ಅಪ್ಪಳ" },
  { q: "ನಾನು ಕುಳಿತರೆ ಎಲ್ಲರೂ ಎದ್ದುನಿಲ್ಲುತ್ತಾರೆ.", a: "ಶಾಲೆಯ ಗಂಟೆ" },
  { q: "ನನ್ನನ್ನು ಹೊಡೆದರೆ ನಾನು ಹಾಡುತ್ತೇನೆ.", a: "ಡೋಲು" },
  { q: "ನನ್ನನ್ನು ಎಳೆದರೆ ಉದ್ದವಾಗುತ್ತೇನೆ, ಬಿಟ್ಟರೆ ಚಿಕ್ಕವನಾಗುತ್ತೇನೆ.", a: "ರಬ್ಬರ್ ಬ್ಯಾಂಡ್" },
  { q: "ಮನೆಗೆ ಬಂದರೆ ಎಲ್ಲರೂ ಓಡಿಸುತ್ತಾರೆ, ಹೋದರೆ ಹುಡುಕುತ್ತಾರೆ.", a: "ವಿದ್ಯುತ್" },
  { q: "ಒಬ್ಬನಿಗೆ ಸಾವಿರ ಕಣ್ಣು, ಆದರೆ ಒಂದನ್ನೂ ಮಿಟುಕಿಸಲಾರ.", a: "ಜಾಲರಿ" },
  { q: "ಬಾಯಿ ತೆರೆದರೆ ಹೊಗೆ, ಬಾಯಿ ಮುಚ್ಚಿದರೆ ಸಾವು.", a: "ಒಲೆ" },
  { q: "ಕೂದಲು ಇಲ್ಲದ ತಲೆ, ಎಲ್ಲರೂ ಸವರುತ್ತಾರೆ.", a: "ತೆಂಗಿನಕಾಯಿ" },
  { q: "ನಾನು ಸತ್ತರೆ ಎಲ್ಲರೂ ತಿನ್ನುತ್ತಾರೆ.", a: "ಮೀನು" },
  { q: "ನಾನು ಓಡಿದರೆ ನೀನು ನಿಲ್ಲುತ್ತೀಯ, ನಾನು ನಿಂತರೆ ನೀನು ಓಡುತ್ತೀಯ.", a: "ಟ್ರಾಫಿಕ್ ಸಿಗ್ನಲ್" },
  { q: "ಬಟ್ಟೆ ಬಿಚ್ಚಿದರೆ ಮಾತ್ರ ಎಲ್ಲರಿಗೂ ಇಷ್ಟ.", a: "ಬಾಳೆಹಣ್ಣು" },
  { q: "ಹೊಟ್ಟೆ ಕತ್ತರಿಸಿದರೆ ಎಲ್ಲರಿಗೂ ಹಂಚಬಹುದು.", a: "ಕಲ್ಲಂಗಡಿ" },
  { q: "ತಲೆ ಒಡೆದರೆ ಮಾತ್ರ ಒಳಗಿನ ಸೊಗಸು ಕಾಣುತ್ತದೆ.", a: "ತೆಂಗಿನಕಾಯಿ" },
  { q: "ಎಷ್ಟು ಒತ್ತಿದರೂ ಬಾಯೇ ತೆಗೆಯುವುದಿಲ್ಲ.", a: "ಮೊಟ್ಟೆ" },
  { q: "ಮೇಲೆ ಕೂದಲು, ಒಳಗೆ ಹಾಲು.", a: "ತೆಂಗಿನಕಾಯಿ" },
  { q: "ಅಂಗಡಿಯಿಂದ ತಂದ ಕೂಡಲೇ ತಲೆ ಕತ್ತರಿಸುತ್ತಾರೆ.", a: "ಎಲೆಕೋಸು" },
  { q: "ಒಳಗೆ ಹೋದರೆ ಕಾಣುವುದಿಲ್ಲ, ಹೊರಗೆ ಬಂದರೆ ಎಲ್ಲರೂ ನೋಡುತ್ತಾರೆ.", a: "ಸೂರ್ಯ" },
  { q: "ಕುತ್ತಿಗೆ ಕತ್ತರಿಸಿದರೆ ಮಾತ್ರ ಅಡುಗೆಗೆ ಬರುತ್ತದೆ.", a: "ಸೊಪ್ಪಿನ ಕಟ್ಟು" },
  { q: "ನೀರಿನಲ್ಲಿ ನೆನೆಸಿದರೆ ಮೃದುವಾಗುತ್ತೇನೆ.", a: "ಅಕ್ಕಿ" },
  { q: "ನನ್ನನ್ನು ಹೊಡೆದಷ್ಟೂ ಸಿಹಿಯಾಗುತ್ತೇನೆ.", a: "ಕಬ್ಬು" },
  { q: "ನನ್ನನ್ನು ಸಿಪ್ಪೆ ತೆಗೆಯದೆ ತಿನ್ನಲು ಆಗುವುದಿಲ್ಲ.", a: "ಕಿತ್ತಳೆ" },
  { q: "ನಾನು ಬಿದ್ದರೆ ಮನೆ ತುಂಬಾ ಗಲಾಟೆ.", a: "ವಿದ್ಯುತ್ ಫ್ಯೂಸ್" },
  { q: "ನನ್ನ ಹೊಟ್ಟೆಯಲ್ಲಿ ನೂರು ಮಕ್ಕಳು.", a: "ದಾಳಿಂಬೆ" },
  { q: "ನನ್ನ ತಲೆ ಮಾತ್ರ ತಿನ್ನುತ್ತಾರೆ, ದೇಹ ಬಿಸಾಡುತ್ತಾರೆ.", a: "ಕ್ಯಾರೆಟ್ (ತಲೆ ಭಾಗ)" },
  { q: "ನಾನು ಸತ್ತರೆ ಮಾತ್ರ ನಿಮಗೆ ಊಟ.", a: "ಕೋಳಿ" },
  { q: "ನನ್ನನ್ನು ಒಡೆದರೆ ಎಲ್ಲರೂ ಕುಡಿಯುತ್ತಾರೆ.", a: "ತೆಂಗಿನಕಾಯಿ" },
  { q: "ನಾನು ಮಲಗಿದ್ದರೆ ಯಾರೂ ಎಬ್ಬಿಸುವುದಿಲ್ಲ, ನಿಂತರೆ ಎಲ್ಲರೂ ನೋಡುತ್ತಾರೆ.", a: "ಮರ" },
  { q: "ನನ್ನನ್ನು ಕತ್ತರಿಸಿದರೆ ನಿನಗೆ ಕಣ್ಣೀರು.", a: "ಈರುಳ್ಳಿ" },
  { q: "ನನ್ನನ್ನು ಬಿಚ್ಚಿದಷ್ಟೂ ನಾನು ಕಡಿಮೆಯಾಗುತ್ತೇನೆ.", a: "ಈರುಳ್ಳಿ" },
  { q: "ಬಿಸಿಯಾದಾಗ ಮಾತ್ರ ನನ್ನ ಬೆಲೆ.", a: "ಚಹಾ" },
  { q: "ತಿಂದರೆ ನಾಲಿಗೆ ಸುಡುತ್ತದೆ, ನೋಡಲು ಸುಂದರ.", a: "ಮೆಣಸಿನಕಾಯಿ" },
  { q: "ನನ್ನನ್ನು ಬಗ್ಗಿಸಿದರೆ ಕೆಲಸ, ನೇರ ಮಾಡಿದರೆ ವ್ಯರ್ಥ.", a: "ಬಿಲ್ಲು" },
  { q: "ಎಲ್ಲರೂ ನನ್ನನ್ನು ಒರೆಯುತ್ತಾರೆ, ಆದರೂ ನಾನು ಕಪ್ಪಾಗಿಯೇ ಇರುತ್ತೇನೆ.", a: "ಕಾವಲಿ" },
  { q: "ಕಾಲು ಇಲ್ಲ, ಆದರೂ ಹತ್ತಿ ಮೇಲಕ್ಕೆ ಹೋಗುತ್ತೇನೆ.", a: "ಹೊಗೆ" },
  { q: "ಎಲ್ಲರೂ ನನ್ನನ್ನು ಹೊಡೆಯುತ್ತಾರೆ, ನಾನು ಮಾತ್ರ ಶಬ್ದ ಮಾಡುತ್ತೇನೆ.", a: "ಡೋಲು" },
  { q: "ತಲೆ ಇದೆ, ಬಾಲ ಇದೆ, ಮಧ್ಯದಲ್ಲಿ ದೇಹವೇ ಇಲ್ಲ.", a: "ನಾಣ್ಯ" },
  { q: "ಹುಟ್ಟಿದಾಗ ನಾಲ್ಕು ಕಾಲು, ಸಾಯುವಾಗ ಎರಡು ಕಾಲು.", a: "ಮಂಚ (ಮರದಿಂದ ಹುಟ್ಟಿ, ಮಂಚವಾಗುವುದು)" },
  { q: "ಒಂದು ಮನೆಯೊಳಗೆ ಮೂವತ್ತೆರಡು ಸೈನಿಕರು.", a: "ಹಲ್ಲುಗಳು" },
  { q: "ಬಿಳಿ ಮನೆಯಲ್ಲಿ ಕೆಂಪು ರಾಜ.", a: "ನಾಲಿಗೆ" },
  { q: "ಹೊರಗೆ ಹಸಿರು, ಒಳಗೆ ಬಿಳಿ, ಮಧ್ಯೆ ಕಪ್ಪು ರಾಜ.", a: "ಸೀಬೆಹಣ್ಣು" },
  { q: "ಎಷ್ಟೇ ಕುಡಿದರೂ ದಾಹ ತೀರದು.", a: "ನೆಲ" },
  { q: "ಒಬ್ಬ ತಾಯಿ, ನೂರಾರು ಮಕ್ಕಳು; ಮಕ್ಕಳು ಹುಟ್ಟಿದ ತಕ್ಷಣ ತಾಯಿ ಸಾಯುತ್ತಾಳೆ.", a: "ಬಾಳೆ ಗಿಡ" },
  { q: "ಒಬ್ಬ ಅಣ್ಣ ಬಂದರೆ ಸಾವಿರ ತಮ್ಮಂದಿರು ಓಡಿಹೋಗುತ್ತಾರೆ.", a: "ಸೂರ್ಯ ಮತ್ತು ನಕ್ಷತ್ರಗಳು" },
  { q: "ನನ್ನನ್ನು ಹಿಡಿದರೆ ಬಿಡಬೇಕು, ಬಿಟ್ಟರೆ ಹಿಡಿಯಬೇಕು.", a: "ಉಸಿರು" },
  { q: "ತಲೆ ಇಲ್ಲ, ಬಾಲ ಇಲ್ಲ, ಆದರೂ ಮಧ್ಯೆ ಗಂಟು.", a: "ಲಡ್ಡು" },
  { q: "ನನ್ನನ್ನು ಕತ್ತರಿಸಿದರೆ ನಾನು ಅಳಿಸುತ್ತೇನೆ.", a: "ಈರುಳ್ಳಿ" },
  { q: "ಒಳಗೆ ಬಿಳಿ, ಹೊರಗೆ ಕಪ್ಪು, ಮಧ್ಯೆ ಸಿಹಿ.", a: "ಕರಿಬೇವು ಬೀಜ (ಪ್ರಾದೇಶಿಕ ರೂಪಾಂತರ)" },
  { q: "ಒಂದು ಮನೆಯಲ್ಲಿ ಎರಡು ಕಿಟಕಿ, ಹೊರಗೆ ನೋಡುತ್ತವೆ, ಒಳಗೆ ನೋಡಲಾರವು.", a: "ಕಣ್ಣುಗಳು" },
  { q: "ಕಾಲಿಲ್ಲ, ಆದರೂ ಬೆಟ್ಟ ಹತ್ತುತ್ತೇನೆ.", a: "ಹೊಗೆ" },
  { q: "ನನ್ನನ್ನು ಎಸೆದರೆ ಮೇಲಕ್ಕೆ ಹೋಗುತ್ತೇನೆ, ಹಿಡಿದರೆ ಕೆಳಗೆ ಬರುತ್ತೇನೆ.", a: "ಚೆಂಡು" },
  { q: "ಒಂದು ಬಟ್ಟೆ, ಸಾವಿರ ಮಡಚು.", a: "ಎಲೆಕೋಸು" },
  { q: "ಒಂದು ಕಾಯಿ, ನೂರು ಕೊಠಡಿ.", a: "ದಾಳಿಂಬೆ" },
  { q: "ತಿಂದರೆ ಹುಟ್ಟುತ್ತೇನೆ, ಕುಡಿದರೆ ಸಾಯುತ್ತೇನೆ.", a: "ಬೆಂಕಿ" },
  { q: "ಕಪ್ಪು ಕುದುರೆ, ಬಿಳಿ ದಾರಿ ಬಿಡುತ್ತಾ ಹೋಗುತ್ತದೆ.", a: "ಚಾಕ್" },
  { q: "ನನ್ನನ್ನು ಎಷ್ಟೇ ಬಳಸಿದರೂ ನಾನು ಕಡಿಮೆಯಾಗುವುದಿಲ್ಲ.", a: "ಜ್ಞಾನ" },
  { q: "ಒಂದು ಹಗ್ಗ, ಎರಡು ಹಾವುಗಳನ್ನು ಕಟ್ಟಿದೆ.", a: "ಚಪ್ಪಲಿ ಲೇಸ್" },
  { q: "ಮನೆ ಇಲ್ಲ, ಬಾಗಿಲಿಲ್ಲ, ಆದರೂ ಎಲ್ಲರೂ ಒಳಗೆ ಹೋಗುತ್ತಾರೆ.", a: "ಶಾಲೆ (ಜ್ಞಾನ ಲೋಕ)" },
  { q: "ಹಗಲು ಕಾಣುವುದಿಲ್ಲ, ರಾತ್ರಿ ಎಲ್ಲರ ಮನೆಗೆ ಬರುತ್ತೇನೆ.", a: "ಚಂದ್ರನ ಬೆಳಕು" },

function pickRandomRiddle(excludeIdx) {
  if (RIDDLES.length <= 1) return 0;
  let i = Math.floor(Math.random() * RIDDLES.length);
  while (i === excludeIdx) i = Math.floor(Math.random() * RIDDLES.length);
  return i;
}

function RiddleScene({ onContinue }) {
  const [idx, setIdx] = useState(() => pickRandomRiddle(-1));
  const [revealed, setRevealed] = useState(false);

  const another = () => {
    chime(700);
    setRevealed(false);
    setIdx((i) => pickRandomRiddle(i));
  };

  const reveal = () => {
    chime(900);
    setRevealed(true);
  };

  const current = RIDDLES[idx];

  return (
    <div className="relative w-full h-full flex flex-col items-center justify-center overflow-hidden px-6 py-8" style={{ background: "radial-gradient(ellipse at 50% 20%, #1a2550 0%, #0d1436 45%, #070a1f 100%)" }}>

      <div className="relative z-10 text-center mb-6" style={{ maxWidth: 400 }}>
        <div style={{ fontSize: 24 }}>🧩</div>
        <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: "1.4rem", color: "#FFE9C2" }}>ಕನ್ನಡ ಒಗಟುಗಳು</h2>
      </div>

      <div
        key={idx}
        className="relative z-10 text-center px-6 py-8"
        style={{
          width: "100%",
          maxWidth: 340,
          minHeight: 190,
          borderRadius: 14,
          background: "rgba(255,253,247,0.06)",
          border: "1px solid rgba(245,197,107,0.35)",
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          justifyContent: "center",
          animation: "fadeInSoft 0.7s ease",
        }}
      >
        <p style={{ fontFamily: "'Caveat', cursive", fontSize: "1.5rem", color: "#FFE9C2", lineHeight: 1.3 }}>{current.q}</p>

        {revealed && (
          <div
            className="mt-5 pt-4"
            style={{ borderTop: "1px dashed rgba(245,197,107,0.35)", width: "100%", animation: "fadeInSoft 0.6s ease" }}
          >
            <p style={{ fontFamily: "'Caveat', cursive", fontSize: "1.5rem", color: "#F5C56B" }}>{current.a}</p>
          </div>
        )}
      </div>

      {!revealed ? (
        <button
          onClick={reveal}
          className="relative z-10 mt-7 px-6 py-2.5 rounded-full text-sm"
          style={{ background: "rgba(245,197,107,0.15)", color: "#F5C56B", border: "1px solid rgba(245,197,107,0.4)", fontFamily: "'Quicksand', sans-serif", fontWeight: 700 }}
        >
          Reveal Answer 👀
        </button>
      ) : (
        <div className="relative z-10 flex items-center gap-3 mt-7">
          <button
            onClick={another}
            className="px-6 py-2.5 rounded-full text-sm"
            style={{ background: "rgba(245,197,107,0.15)", color: "#F5C56B", border: "1px solid rgba(245,197,107,0.4)", fontFamily: "'Quicksand', sans-serif", fontWeight: 700 }}
          >
            🎲 Another Riddle
          </button>
          <button
            onClick={onContinue}
            className="px-6 py-2.5 rounded-full text-sm"
            style={{ background: "linear-gradient(135deg,#F5C56B,#E0A94C)", color: "#2a1c05", fontFamily: "'Quicksand', sans-serif", fontWeight: 700 }}

            Read The Poem →
          </button>
        </div>
      )}
    </div>
  );
}

function FloatingHearts({ count = 16 }) {
  const hearts = useRef(
    Array.from({ length: count }, () => ({
      left: Math.random() * 100,
      size: 10 + Math.random() * 16,
      delay: Math.random() * 6,
      dur: 6 + Math.random() * 5,
      opacity: 0.35 + Math.random() * 0.4,
    }))
  ).current;
  return (
    <div className="absolute inset-0 overflow-hidden pointer-events-none" style={{ zIndex: 1 }}>
      {hearts.map((h, i) => (
        <span
          key={i}
          style={{
            position: "absolute",
            left: `${h.left}%`,
            bottom: -30,
            fontSize: h.size,
            opacity: h.opacity,
            animation: `floatHeart ${h.dur}s ease-in ${h.delay}s infinite`,
          }}
        >
          💗
        </span>
      ))}
    </div>
  );
}

          <p style={{ fontFamily: "'Quicksand', sans-serif", fontSize: "0.7rem", color: "#8A93C9", letterSpacing: 1, textAlign: "center", marginBottom: 14 }}>
            JUMP TO A PART
          </p>
          <div className="flex flex-col gap-2" style={{ maxWidth: 320, margin: "0 auto" }}>
            {SCENE_LIST.map((s) => (
              <button
                key={s.id}
                onClick={() => {
                  onNavigate(s.id);
                  setOpen(false);
                }}
                className="px-4 py-3 text-left"
                style={{
                  borderRadius: 10,
                  background: current === s.id ? "rgba(245,197,107,0.18)" : "rgba(255,255,255,0.04)",
                  border: current === s.id ? "1px solid rgba(245,197,107,0.5)" : "1px solid rgba(255,255,255,0.08)",
                  color: "#FFE9C2",
                  fontFamily: "'Quicksand', sans-serif",
                  fontSize: "0.9rem",
                }}
              >
                {s.label}
              </button>
            ))}
          </div>
        </div>
      )}
    </>
  );
}

function MusicToggle() {
  const [on, setOn] = useState(true);
  useEffect(() => {
    const start = () => {
      if (on) startMelody();
      document.removeEventListener("pointerdown", start);
    };
    document.addEventListener("pointerdown", start);
    return () => document.removeEventListener("pointerdown", start);
  }, []);
  const toggle = () => {
    setOn((v) => {
      const next = !v;
      if (next) startMelody();
      else stopMelody();
      return next;
    });
  };
  return (
    <button
      onClick={toggle}
      aria-label="Toggle music"
      className="fixed"
      style={{
        top: 16,
        right: 16,
        zIndex: 100,
        width: 38,
        height: 38,
        borderRadius: "50%",
        background: "rgba(0,0,0,0.4)",
        border: "1px solid rgba(245,197,107,0.4)",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
      }}
    >
      {on ? <Volume2 size={17} color="#F5C56B" /> : <VolumeX size={17} color="#F5C56B" />}
    </button>
  );
}
